<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Municode Document Extractor — Jansen Stage 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222534;
    --border: #2e3247;
    --accent: #4f7cff;
    --accent2: #00d4aa;
    --warn: #ffb84d;
    --danger: #ff5f5f;
    --text: #e8eaf0;
    --text2: #8b90a8;
    --text3: #555b76;
    --plan: #4f7cff;
    --insp: #00d4aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(79,124,255,0.1);
    border: 1px solid rgba(79,124,255,0.25);
    padding: 4px 10px;
    border-radius: 3px;
  }

  header h1 { font-size: 15px; font-weight: 500; }

  header span {
    font-size: 13px;
    color: var(--text3);
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
  }

  .main { max-width: 1200px; margin: 0 auto; padding: 32px; }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(79,124,255,0.05);
  }

  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon { font-size: 32px; margin-bottom: 12px; }
  .upload-zone h2 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .upload-zone p { font-size: 13px; color: var(--text2); }

  .processing-list { margin-top: 24px; display: flex; flex-direction: column; gap: 8px; }

  .file-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }

  .file-item .fname {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-item .status { font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
  .status.pending { color: var(--text3); }
  .status.loading { color: var(--warn); }
  .status.done { color: var(--accent2); }
  .status.error { color: var(--danger); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--warn);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .results-section { margin-top: 32px; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .results-header h2 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3d6ae8; }
  .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--text2); color: var(--text); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(255,95,95,0.3); font-size: 11px; padding: 4px 10px; }
  .btn-danger:hover { background: rgba(255,95,95,0.1); }

  .doc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .doc-card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .doc-type-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .badge-plan { background: rgba(79,124,255,0.15); color: var(--plan); border: 1px solid rgba(79,124,255,0.3); }
  .badge-insp { background: rgba(0,212,170,0.15); color: var(--insp); border: 1px solid rgba(0,212,170,0.3); }
  .badge-unknown { background: rgba(139,144,168,0.15); color: var(--text2); border: 1px solid var(--border); }

  .doc-meta { display: flex; gap: 20px; flex: 1; flex-wrap: wrap; }

  .meta-item { display: flex; flex-direction: column; gap: 2px; }

  .meta-label {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
  }

  .meta-value input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 3px 7px;
    outline: none;
    transition: border-color 0.15s;
  }
  .meta-value input:focus { border-color: var(--accent); }

  .actions-table { width: 100%; border-collapse: collapse; }

  .actions-table th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .actions-table td {
    padding: 10px 14px;
    font-size: 13px;
    border-bottom: 1px solid rgba(46,50,71,0.5);
    vertical-align: top;
    line-height: 1.5;
  }

  .actions-table tr:last-child td { border-bottom: none; }
  .actions-table tr:hover td { background: rgba(255,255,255,0.015); }

  .item-num { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text2); white-space: nowrap; }

  .action-text textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    padding: 4px 7px;
    resize: vertical;
    min-height: 60px;
    outline: none;
    transition: border-color 0.15s;
  }
  .action-text textarea:focus { border-color: var(--accent); }

  .code-ref input {
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 3px 7px;
    width: 100px;
    outline: none;
  }
  .code-ref input:focus { border: 1px solid var(--accent); }

  .add-row-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 8px 14px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: all 0.15s;
    border-top: none;
  }
  .add-row-btn:hover { color: var(--accent); border-color: rgba(79,124,255,0.4); background: rgba(79,124,255,0.03); }

  .export-bar {
    position: sticky;
    bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    z-index: 10;
  }

  .export-bar .summary { font-size: 13px; color: var(--text2); }
  .export-bar .summary strong { color: var(--text); font-weight: 600; }
  .btn-group { display: flex; gap: 8px; }

  .error-msg {
    background: rgba(255,95,95,0.08);
    border: 1px solid rgba(255,95,95,0.25);
    color: var(--danger);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 13px;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">BHP</div>
  <h1>Municode Document Extractor</h1>
  <span>Jansen Stage 1 — Building Permit Log</span>
</header>

<div class="main">
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".pdf" multiple>
    <div class="upload-icon">⬆</div>
    <h2>Drop PDFs here or click to browse</h2>
    <p>Plan Examination Reports & Periodic Inspection Reports — up to 5 files at a time</p>
  </div>

  <div class="processing-list" id="processingList"></div>

  <div class="results-section">
    <div class="results-header">
      <h2>Extracted Data</h2>
      <button class="btn btn-outline" onclick="clearAll()">Clear All</button>
    </div>
    <div id="docCards"></div>
  </div>
</div>

<div class="export-bar" id="exportBar" style="display:none">
  <div class="summary" id="exportSummary"></div>
  <div class="btn-group">
    <button class="btn btn-outline" onclick="exportCSV()">Export CSV</button>
    <button class="btn btn-primary" onclick="copyForExcel()">Copy for Excel</button>
  </div>
</div>

<script>
const allDocs = [];

const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const processingList = document.getElementById('processingList');
const docCards = document.getElementById('docCards');
const exportBar = document.getElementById('exportBar');
const exportSummary = document.getElementById('exportSummary');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  handleFiles(Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf'));
});
fileInput.addEventListener('change', () => handleFiles(Array.from(fileInput.files)));

async function handleFiles(files) {
  if (!files.length) return;
  for (const file of files) await processFile(file);
  updateExportBar();
}

function addFileItem(name) {
  const el = document.createElement('div');
  el.className = 'file-item';
  el.id = `fi-${CSS.escape(name)}`;
  el.innerHTML = `<div class="fname">${name}</div><div class="status pending" id="st-${CSS.escape(name)}">Queued</div>`;
  processingList.appendChild(el);
}

function setStatus(name, state, msg) {
  const st = document.getElementById(`st-${CSS.escape(name)}`);
  const fi = document.getElementById(`fi-${CSS.escape(name)}`);
  if (!st) return;
  st.className = `status ${state}`;
  st.textContent = msg;
  const sp = fi.querySelector('.spinner');
  if (state === 'loading') {
    if (!sp) { const s = document.createElement('div'); s.className = 'spinner'; fi.insertBefore(s, st); }
  } else { if (sp) sp.remove(); }
}

async function processFile(file) {
  addFileItem(file.name);
  setStatus(file.name, 'loading', 'Reading PDF...');
  try {
    const base64 = await fileToBase64(file);
    setStatus(file.name, 'loading', 'Extracting with AI...');
    const result = await callExtractAPI(base64, file.name);
    if (result.error) throw new Error(result.error);
    const doc = { ...result, fileName: file.name, id: Date.now() + Math.random() };
    allDocs.push(doc);
    renderDocCard(doc);
    setStatus(file.name, 'done', `Done — ${result.actions.length} action(s)`);
  } catch (err) {
    setStatus(file.name, 'error', 'Failed');
    const fi = document.getElementById(`fi-${CSS.escape(file.name)}`);
    const errEl = document.createElement('div');
    errEl.className = 'error-msg';
    errEl.textContent = `Error: ${err.message}`;
    fi.after(errEl);
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Failed to read file'));
    r.readAsDataURL(file);
  });
}

async function callExtractAPI(base64, filename) {
  const response = await fetch('/api/extract', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ base64, filename })
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error || `Server error ${response.status}`);
  }
  return response.json();
}

function renderDocCard(doc) {
  const badgeClass = doc.docType === 'PLAN EXAMINATION REPORT' ? 'badge-plan'
    : doc.docType === 'PERIODIC INSPECTION REPORT' ? 'badge-insp' : 'badge-unknown';
  const badgeLabel = doc.docType === 'PLAN EXAMINATION REPORT' ? 'Plan Exam'
    : doc.docType === 'PERIODIC INSPECTION REPORT' ? 'Inspection' : 'Unknown';

  const inspRow = doc.docType === 'PERIODIC INSPECTION REPORT' ? `
    <div class="meta-item">
      <div class="meta-label">Insp #</div>
      <div class="meta-value"><input type="text" value="${esc(doc.inspectionNumber)}" style="width:80px" onchange="updateMeta('${doc.id}','inspectionNumber',this.value)"></div>
    </div>` : '';

  const card = document.createElement('div');
  card.className = 'doc-card';
  card.id = `card-${doc.id}`;
  card.innerHTML = `
    <div class="doc-card-header">
      <span class="doc-type-badge ${badgeClass}">${badgeLabel}</span>
      <div class="doc-meta">
        <div class="meta-item">
          <div class="meta-label">File #</div>
          <div class="meta-value"><input type="text" value="${esc(doc.fileNumber)}" style="width:100px" onchange="updateMeta('${doc.id}','fileNumber',this.value)"></div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Date</div>
          <div class="meta-value"><input type="text" value="${esc(doc.date)}" style="width:110px" onchange="updateMeta('${doc.id}','date',this.value)"></div>
        </div>
        ${inspRow}
        <div class="meta-item">
          <div class="meta-label">Title</div>
          <div class="meta-value"><input type="text" value="${esc(doc.title)}" style="width:320px" onchange="updateMeta('${doc.id}','title',this.value)"></div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Project Stage</div>
          <div class="meta-value"><input type="text" placeholder="JS1" style="width:70px;font-family:'IBM Plex Mono',monospace;font-size:12px" onchange="updateMeta('${doc.id}','projectStage',this.value)"></div>
        </div>
      </div>
      <button class="btn btn-danger" onclick="removeDoc('${doc.id}')">Remove</button>
    </div>
    <table class="actions-table">
      <thead>
        <tr>
          <th style="width:70px">Item #</th>
          <th style="width:120px">Code Ref</th>
          <th>Action Required</th>
        </tr>
      </thead>
      <tbody id="tbody-${doc.id}">
        ${doc.actions.length
          ? doc.actions.map((a, i) => actionRow(doc.id, i, a)).join('')
          : `<tr><td colspan="3" style="color:var(--text3);font-size:13px;padding:16px 14px">No action items extracted — document may be a memo or unsupported format.</td></tr>`}
      </tbody>
    </table>
    <button class="add-row-btn" onclick="addRow('${doc.id}')">+ Add row</button>
  `;
  docCards.appendChild(card);
}

function actionRow(docId, idx, action) {
  return `<tr>
    <td class="item-num"><input type="text" value="${esc(action.itemNum)}" style="background:var(--surface2);border:1px solid transparent;border-radius:3px;color:var(--text2);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:3px 7px;width:56px;outline:none" onchange="updateAction('${docId}',${idx},'itemNum',this.value)"></td>
    <td class="code-ref"><input type="text" value="${esc(action.codeRef)}" onchange="updateAction('${docId}',${idx},'codeRef',this.value)"></td>
    <td class="action-text"><textarea onchange="updateAction('${docId}',${idx},'actionText',this.value)">${esc(action.actionText)}</textarea></td>
  </tr>`;
}

function updateMeta(id, field, val) {
  const doc = allDocs.find(d => String(d.id) === String(id));
  if (doc) doc[field] = val;
  updateExportBar();
}

function updateAction(docId, idx, field, val) {
  const doc = allDocs.find(d => String(d.id) === String(docId));
  if (doc && doc.actions[idx]) doc.actions[idx][field] = val;
}

function addRow(docId) {
  const doc = allDocs.find(d => String(d.id) === String(docId));
  if (!doc) return;
  const idx = doc.actions.length;
  doc.actions.push({ itemNum: '', codeRef: '', actionText: '' });
  document.getElementById(`tbody-${docId}`).insertAdjacentHTML('beforeend', actionRow(docId, idx, doc.actions[idx]));
  updateExportBar();
}

function removeDoc(id) {
  const i = allDocs.findIndex(d => String(d.id) === String(id));
  if (i > -1) allDocs.splice(i, 1);
  document.getElementById(`card-${id}`)?.remove();
  updateExportBar();
}

function clearAll() {
  allDocs.length = 0;
  docCards.innerHTML = '';
  processingList.innerHTML = '';
  updateExportBar();
}

function updateExportBar() {
  const total = allDocs.reduce((sum, d) => sum + d.actions.length, 0);
  if (!allDocs.length) { exportBar.style.display = 'none'; return; }
  exportBar.style.display = 'flex';
  exportSummary.innerHTML = `<strong>${allDocs.length}</strong> document(s) · <strong>${total}</strong> action row(s) ready`;
}

function buildRows() {
  const rows = [];
  for (const doc of allDocs) {
    for (const a of doc.actions) {
      rows.push([
        '',
        '',
        doc.fileNumber || '',
        doc.inspectionNumber || '',
        doc.docType || '',
        doc.date || '',
        doc.title || '',
        a.itemNum || '',
        a.codeRef || '',
        a.actionText || '',
        '',
        '',
        '',
        '',
        '',
        doc.projectStage || 'JS1'
      ]);
    }
  }
  return rows;
}

function exportCSV() {
  const headers = ['Transmittal','Doc #','Municode Plan Exam# / File #','Insp #','Type','Date','Title','Item','Code ref. NBC 2015','Action Required','Action By','Action Due Date','Date Closed','STATUS','Comments/Updates/Notes','Project Stage'];
  const rows = buildRows();
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'plan_exam_extract.csv'; a.click();
  URL.revokeObjectURL(url);
}

function copyForExcel() {
  const headers = ['Transmittal','Doc #','Municode Plan Exam# / File #','Insp #','Type','Date','Title','Item','Code ref. NBC 2015','Action Required','Action By','Action Due Date','Date Closed','STATUS','Comments/Updates/Notes','Project Stage'];
  const rows = buildRows();
  const tsv = [headers, ...rows].map(r => r.join('\t')).join('\n');
  navigator.clipboard.writeText(tsv).then(() => {
    const btn = document.querySelector('.btn-primary');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
